<!DOCTYPE html>
<html>
<head>
    <title>My Simple Website</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        header {
            padding: 60px 20px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            background-color: white;
            color: #333;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background-color: #f1f1f1;
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            background-color: rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Website 🚀</h1>
        <p>This is a simple static website hosted on S3.</p>
        <button onclick="showMessage()">Click Me</button>
    </header>

    <footer>
        <p>© 2026 My Website | Built by Natesan</p>
    </footer>

    <script>
        function showMessage() {
            alert("Hello! Your website is working perfectly!");
        }
    </script>

</body>
</html>
